name: Compile LaTeX

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Install Pygments (for minted)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pygments

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          # -shell-escape is required for the minted package (code highlighting)
          args: "-pdf -shell-escape -interaction=nonstopmode"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: main.pdf
